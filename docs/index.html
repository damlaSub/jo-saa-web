<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jonathan Saada</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --black: #0a0a0a;
      --white: #ffffff;
      --grey-bg: #FAF9F7;
      --grey-mid: #9a9591;
      --grey-dark: #4a4846;
      --border: transparent;
      --font: 'Brown Pro', sans-serif;
      --serif: Didot, Bodoni, 'Playfair Display', 'Times New Roman', serif;
      --nav-h: 100px;
      --max-w: 1160px;
    }

    @font-face {
      font-family: 'Brown Pro';
      src: url('fonts/BrownPro-Thin-CBYGkuCj.ttf') format('truetype');
      font-weight: 300;
      font-style: normal;
    }

    @font-face {
      font-family: 'Brown Pro';
      src: url('fonts/BrownPro-Regular-D_LjtTjE.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
    }

    @font-face {
      font-family: 'Brown Pro';
      src: url('fonts/BrownPro-Bold-OW29qoPv.ttf') format('truetype');
      font-weight: 700;
      font-style: normal;
    }

    @font-face {
      font-family: 'Brown Pro';
      src: url('fonts/BrownPro-Light-CLqcrCeR.ttf') format('truetype');
      font-weight: 200;
      font-style: normal;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: var(--font);
      font-weight: 400;
      font-size: 14px;
      line-height: 1.6;
      color: var(--black);
      background: var(--white);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      display: block;
      max-width: 100%;
    }


    /* ── HEADER ── */
    header {
      position: fixed;
      inset: 0 0 auto 0;
      height: var(--nav-h);
      background: var(--white);
      z-index: 100;
    }

    .header-inner {
      height: 100%;
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 0 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo-wrap {
      display: flex;
      align-items: center;
      cursor: pointer;
      flex-shrink: 0;
      margin-left: -3px;
    }

    /* ── LOGO SVG — single line, matched height ── */
    .logo-svg {
      height: 48px;
      width: auto;
      max-width: 80vw;
    }

    nav.desk {
      display: flex;
      align-items: center;
      gap: 32px;
    }

    .nav-link {
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      position: relative;
      padding-bottom: 2px;
      cursor: pointer;
      background: none;
      border: none;
      color: var(--black);
      font-family: var(--font);
    }

    .nav-link::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: var(--black);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.25s ease;
    }

    .nav-link:hover::after {
      transform: scaleX(1);
    }

    .lang-toggle {
      display: flex;
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .lang-btn {
      font-family: var(--font);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.12em;
      padding: 5px 11px;
      cursor: pointer;
      background: var(--white);
      color: var(--grey-mid);
      border: none;
      transition: background 0.15s, color 0.15s;
    }

    .lang-btn.active {
      background: var(--black);
      color: var(--white);
    }

    /* ── HAMBURGER — height matches logo SVG (48px desktop / 42px mobile) ── */
    .hamburger {
      display: none;
      flex-direction: column;
      justify-content: center;
      gap: 7px;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      /* remove extra padding so height is just the lines area */
      height: 48px;
      /* same as .logo-svg */
      width: 38px;
    }

    .hamburger span {
      display: block;
      width: 38px;
      height: 2px;
      background: var(--black);
      transition: transform 0.26s, opacity 0.26s;
    }

    .hamburger.open span:nth-child(1) {
      transform: rotate(45deg) translate(6px, 6px);
    }

    .hamburger.open span:nth-child(2) {
      opacity: 0;
    }

    .hamburger.open span:nth-child(3) {
      transform: rotate(-45deg) translate(6px, -6px);
    }

    .mobile-nav {
      display: none;
      position: fixed;
      top: var(--nav-h);
      left: 0;
      right: 0;
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 28px 24px 32px;
      z-index: 99;
      flex-direction: column;
      gap: 26px;
    }

    .mobile-nav.open {
      display: flex;
    }

    .mobile-nav .nav-link {
      font-size: 13px;
    }

    /* ── VIEWS ── */
    #app {
      padding-top: var(--nav-h);
      min-height: 100vh;
    }

    .view {
      display: none;
    }

    .view.active {
      display: block;
    }



    #view-oeuvres {
      padding: 32px 40px 60px;
    }

    .oeuvres-inner {
      max-width: var(--max-w);
      margin: 0 auto;
    }

    .paintings-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 40px 20px;
    }

    .painting-card {
      cursor: pointer;
      display: block;
    }

    /* 2:3 portrait — same as Piasa (their images are 320×480px) */
    .painting-thumb {
      aspect-ratio: 2 / 3;
      background: var(--grey-bg);
      overflow: hidden;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .painting-thumb img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      padding: 8px;
    }

    .painting-card:hover .painting-thumb img {
      transform: scale(1.04);
    }

    /* Piasa-style lot number */
    /* Piasa: painting name — bold serif, with top space from image */
    .painting-name {
      font-family: var(--font);
      font-size: 14px;
      font-weight: 700;
      line-height: 1.3;
      color: #182028;
      padding-top: 17px;
    }

    /* Piasa: object/technique line is regular weight, same size */
    .painting-meta {
      font-family: var(--font);
      font-size: 13px;
      font-weight: 400;
      color: #353945;
    }

    /* Piasa: "Estimation" label + price block */
    .painting-price-block {
      margin-top: 8px;
    }

    .painting-price-label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #6A768D;
      display: block;
      margin-bottom: 1px;
    }

    .painting-price-value {
      font-size: 13px;
      font-weight: 400;
      color: #182028;
    }

    /* ── PAINTING DETAIL ── */
    #view-detail {
      padding: 48px 40px 80px;
    }

    .detail-inner {
      max-width: var(--max-w);
      margin: 0 auto;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--grey-mid);
      cursor: pointer;
      margin-bottom: 40px;
      background: none;
      border: none;
      font-family: var(--font);
      transition: color 0.2s;
    }

    .back-link:hover {
      color: var(--black);
    }

    .back-link:hover svg {
      transform: translateX(-3px);
    }

    .back-link svg {
      transition: transform 0.2s;
    }

    .detail-layout {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 60px;
      align-items: start;
    }

    /* Main image: portrait ratio like Piasa, contain so painting is never cropped */
    .detail-main-wrap {
      background: var(--grey-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      aspect-ratio: 2 / 3;
      overflow: hidden;
      position: relative;
    }

    .detail-main-wrap img {
      max-width: 92%;
      max-height: 92%;
      width: auto;
      height: auto;
      object-fit: contain;
    }

    @keyframes slideFromRight {
      from {
        opacity: 0;
        transform: translateX(30px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes slideFromLeft {
      from {
        opacity: 0;
        transform: translateX(-30px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    /* When sliding, the animation handles opacity — override the base opacity:0 rule */
    .detail-main-wrap img.slide-right {
      animation: slideFromRight 0.35s ease forwards;
      opacity: 1;
      /* allow animation to control opacity */
    }

    .detail-main-wrap img.slide-left {
      animation: slideFromLeft 0.35s ease forwards;
      opacity: 1;
      /* allow animation to control opacity */
    }

    .detail-thumbs {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .detail-thumb {
      width: 56px;
      height: 84px;
      /* 2:3 portrait thumbs */
      background: var(--grey-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border: 1.5px solid transparent;
      transition: border-color 0.18s;
      flex-shrink: 0;
      overflow: hidden;
    }

    .detail-thumb.active {
      border-color: var(--black);
    }

    .detail-thumb:hover:not(.active) {
      border-color: var(--border);
    }

    .detail-thumb img {
      max-width: 88%;
      max-height: 88%;
      width: auto;
      height: auto;
      object-fit: contain;
    }

    /* Right info column */
    .detail-info {
      position: sticky;
      top: calc(var(--nav-h) + 32px);
    }

    /* Piasa detail: large serif h1 for painting name */
    .detail-painting-name {
      font-family: var(--font);
      font-size: clamp(22px, 3vw, 34px);
      font-weight: 700;
      line-height: 1.15;
      margin-bottom: 20px;
      color: #182028;
    }

    /* Piasa detail: all info as plain running lines — no label/value rows */
    .detail-info-lines {
      font-family: var(--font);
      font-size: 16px;
      font-weight: 400;
      color: #353945;
      margin-bottom: 24px;
    }

    /* Piasa: "Estimation" label above price */
    .detail-estimation-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #6A768D;
      display: block;
      margin-bottom: 4px;
      margin-top: 4px;
    }

    .detail-estimation-value {
      font-size: 18px;
      font-weight: 400;
      color: #353945;
      display: block;
    }

    /* Prev/next navigation */
    .detail-nav {
      display: flex;
      justify-content: space-between;
      margin-top: 32px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    .detail-nav-btn {
      background: none;
      border: none;
      font-family: var(--font);
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--grey-mid);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color 0.2s;
    }

    .detail-nav-btn:hover {
      color: var(--black);
    }

    .detail-nav-btn:disabled {
      opacity: 0.2;
      cursor: default;
    }

    /* ── BIOGRAPHY ── */
    #view-bio {
      padding: 64px 40px 80px;
    }

    .bio-inner {
      max-width: var(--max-w);
      margin: 0 auto;
    }



    .bio-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 60px;
      align-items: start;
    }

    .bio-photo {
      width: 100%;
      aspect-ratio: 2 / 3;
      /* portrait 2:3 — consistent with grid cards */
      overflow: hidden;
      background: var(--grey-bg);
      position: relative;
    }

    .bio-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .bio-photo-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.15;
    }

    .bio-text-col {
      position: sticky;
      top: calc(var(--nav-h) + 40px);
    }

    /* Piasa bio text: clean, readable, grey-dark, generous line-height */
    .bio-text-col p {
      font-family: var(--font);
      font-size: 14px;
      font-weight: 400;
      line-height: 1.85;
      color: var(--grey-dark);
      margin-bottom: 20px;
    }

    .bio-text-col p:last-child {
      margin-bottom: 0;
    }

    /* ── CONTACT ── */
    #view-contact {
      padding: 72px 40px 80px;
    }

    .contact-inner {
      max-width: var(--max-w);
      margin: 0 auto;
    }

    .contact-title {
      font-family: var(--font);
      font-size: clamp(26px, 4vw, 42px);
      font-weight: 500;
      line-height: 1.1;
      color: var(--grey-dark);
      margin-bottom: 36px;
    }

    .contact-block {
      max-width: 480px;
    }

    .contact-row {
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
    }

    .contact-label {
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--grey-mid);
      font-weight: 400;
    }

    .contact-value {
      font-family: var(--font);
      font-size: 14px;
      font-weight: 400;
      line-height: 1.85;
      color: var(--grey-dark);
      margin-bottom: 20px;
    }

    .contact-value a {
      color: var(--grey-dark);
    }

    .contact-value a:hover {
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    /* ── LEGAL PAGES ── */
    #view-legal {
      padding: 64px 40px 80px;
    }

    .legal-inner {
      max-width: 740px;
      margin: 0 auto;
    }

    .legal-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--grey-mid);
      cursor: pointer;
      margin-bottom: 48px;
      background: none;
      border: none;
      font-family: var(--font);
      transition: color 0.2s;
    }

    .legal-back:hover {
      color: var(--black);
    }

    .legal-back:hover svg {
      transform: translateX(-3px);
    }

    .legal-back svg {
      transition: transform 0.2s;
    }

    .legal-inner h1 {
      font-family: var(--font);
      font-size: clamp(22px, 3vw, 34px);
      font-weight: 700;
      margin-bottom: 40px;
      color: var(--black);
    }

    .legal-inner h2 {
      font-family: var(--font);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--grey-mid);
      margin: 32px 0 10px;
    }

    .legal-inner p {
      font-size: 14px;
      font-weight: 300;
      line-height: 1.85;
      color: var(--grey-dark);
      margin-bottom: 14px;
    }

    .legal-inner ul {
      margin: 10px 0 14px 20px;
    }

    .legal-inner ul li {
      font-size: 14px;
      font-weight: 300;
      line-height: 1.85;
      color: var(--grey-dark);
      margin-bottom: 6px;
    }

    .legal-inner a {
      color: var(--black);
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    /* ── FOOTER ── */
    footer {
      background: var(--black);
      color: rgba(255, 255, 255, 0.38);
      padding: 32px 40px;
    }

    .footer-all {
      max-width: var(--max-w);
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      flex-wrap: wrap;
      font-size: 11px;
      letter-spacing: 0.05em;
    }

    .footer-copyright {
      white-space: nowrap;
    }

    .footer-links ul {
      list-style: none;
      display: flex;
      flex-direction: row;
      gap: 24px;
      flex-wrap: wrap;
      align-items: center;
    }

    .footer-links a {
      font-size: 11px;
      letter-spacing: 0.08em;
      color: rgba(255, 255, 255, 0.45);
      cursor: pointer;
      transition: color 0.18s;
      white-space: nowrap;
    }

    .footer-links a:hover {
      color: rgba(255, 255, 255, 0.85);
    }

    .footer-madeby {
      white-space: nowrap;
    }

    /* ── RESPONSIVE ── */

    /* ≤1024px: hamburger replaces desktop nav — gives logo full width */
    @media (max-width: 1024px) {
      nav.desk {
        display: none;
      }

      .hamburger {
        display: flex;
      }

      .mobile-nav {
        padding: 11px 24px 11px;
        gap: 20px;
      }
    }

    /* ≤1100px: 3 columns */
    @media (max-width: 1100px) {
      .paintings-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    /* ≤860px: 2 columns, bio stacks */
    @media (max-width: 860px) {
      .paintings-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .detail-layout {
        grid-template-columns: 1fr;
      }

      .detail-info {
        position: static;
        margin-top: 32px;
      }

      .bio-layout {
        grid-template-columns: 1fr;
        gap: 40px;
      }

      .bio-photo {
        aspect-ratio: 3 / 4;
      }

      .bio-text-col {
        position: static;
      }

      footer {
        padding: 32px 40px;
      }

      .footer-all {
        flex-direction: column;
        align-items: center;
        text-align: center;
        gap: 14px;
      }

      .footer-links ul {
        justify-content: center;
        gap: 16px;
      }
    }

    /* ≤640px: mobile padding + grid, logo & hamburger shrink together */
    @media (max-width: 640px) {
      :root {
        --nav-h: 90px;
      }

      .logo-svg {
        height: 42px;
      }

      /* hamburger matches the 42px logo height on mobile */
      .hamburger {
        height: 42px;
      }

      #view-oeuvres,
      #view-detail,
      #view-bio,
      #view-contact,
      #view-legal {
        padding-left: 32px;
        padding-right: 32px;
        padding-top: 0px;
      }

      .header-inner {
        padding: 0 20px;
      }

      .paintings-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 24px 16px;
      }

      .bio-photo {
        aspect-ratio: 2 / 3;
      }

      footer {
        padding: 28px 16px;
      }

      .footer-links ul {
        flex-direction: column;
        align-items: center;
        gap: 10px;
      }
    }

  </style>
</head>

<body>

  <header>
    <div class="header-inner">
      <div class="logo-wrap" onclick="navigate('oeuvres')" role="button" tabindex="0"
        onkeydown="if(event.key==='Enter')navigate('oeuvres')" aria-label="Accueil">

        <svg class="logo-svg" viewBox="0 0 420 44" fill="none" xmlns="http://www.w3.org/2000/svg"
          aria-label="Jonathan Saada">
          <text y="36" font-size="36" fill="#182028" style="font-family:'Brown Pro',sans-serif; letter-spacing:-1px;">
            <tspan style="font-weight:200;">JONATHAN</tspan>
            <tspan dx="12" style="font-weight:400;">SAADA</tspan>
          </text>
        </svg>

      </div>
      <nav class="desk" id="desk-nav"></nav>
      <button class="hamburger" id="hamburger" aria-label="Menu" onclick="toggleMobile()">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <nav class="mobile-nav" id="mobile-nav"></nav>

  <div id="app">

    <!-- GRID -->
    <div id="view-oeuvres" class="view active">
      <div class="oeuvres-inner">
        <div class="paintings-grid" id="paintings-grid"></div>
      </div>
    </div>

    <!-- DETAIL -->
    <div id="view-detail" class="view">
      <div class="detail-inner">
        <button class="back-link" onclick="navigate('oeuvres')">
          <svg width="16" height="10" viewBox="0 0 16 10" fill="none">
            <path d="M0 5h15M5 1L1 5l4 4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" />
          </svg>
          <span id="back-label"></span>
        </button>
        <div class="detail-layout">
          <div>
            <div class="detail-main-wrap" id="detail-main-wrap">
              <img id="detail-main-img" src="" alt="">
            </div>
            <div class="detail-thumbs" id="detail-thumbs"></div>
          </div>
          <div class="detail-info">
            <h2 class="detail-painting-name" id="detail-name"></h2>
            <div class="detail-info-lines" id="detail-info-lines"></div>
            <span class="detail-estimation-label" id="detail-price-label"></span>
            <span class="detail-estimation-value" id="detail-price-value"></span>
            <div class="detail-nav">
              <button class="detail-nav-btn" id="btn-prev" onclick="detailNav(-1)">
                <svg width="14" height="8" viewBox="0 0 14 8" fill="none">
                  <path d="M0 4h13M4 1L1 4l3 3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" />
                </svg>
                <span id="label-prev"></span>
              </button>
              <button class="detail-nav-btn" id="btn-next" onclick="detailNav(1)">
                <span id="label-next"></span>
                <svg width="14" height="8" viewBox="0 0 14 8" fill="none">
                  <path d="M14 4H1M10 1l3 3-3 3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" />
                </svg>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- BIO -->
    <div id="view-bio" class="view">
      <div class="bio-inner">
        <p class="view-eyebrow" id="eyebrow-bio"></p>
        <h1 class="bio-title" id="bio-title"></h1>
        <div class="bio-layout">
          <div class="bio-photo-col">
            <div class="bio-photo" id="bio-photo"></div>
          </div>
          <div class="bio-text-col" id="bio-text"></div>
        </div>
      </div>
    </div>

    <!-- CONTACT -->
    <div id="view-contact" class="view">
      <div class="contact-inner">
        <h1 class="contact-title">Contact</h1>
        <div class="contact-block" id="contact-block"></div>
      </div>
    </div>

    <!-- LEGAL -->
    <div id="view-legal" class="view">
      <div class="legal-inner">
        <button class="legal-back" onclick="navigate('oeuvres')">
          <svg width="16" height="10" viewBox="0 0 16 10" fill="none">
            <path d="M0 5h15M5 1L1 5l4 4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" />
          </svg>
          <span id="legal-back-label">Retour</span>
        </button>
        <div id="legal-content"></div>
      </div>
    </div>

  </div>

  <footer>
    <div class="footer-all">
      <span class="footer-copyright" id="footer-copyright"></span>
      <div class="footer-links">
        <ul>
          <li><a onclick="navigate('cookies')" href="#cookies">Politique en matière de cookies</a></li>
          <li><a onclick="navigate('mentions')" href="#mentions">Mentions légales</a></li>
          <li><a onclick="navigate('confidentialite')" href="#confidentialite">Politique de confidentialité</a></li>
        </ul>
      </div>
      <span class="footer-madeby" id="footer-madeby"></span>
    </div>
  </footer>

  <script>
    /* ── STATE ── */
    let lang = 'fr';
    let paintings = [];
    let bio = {};
    let site = {};
    let currentView = 'oeuvres';
    let currentPaintingIdx = 0;
    let currentThumbIdx = 0;


    /* ── BOOT ── */
    async function boot() {
      try {
        [paintings, bio, site] = await Promise.all([
          fetch('data/paintings.json').then(r => r.json()),
          fetch('data/biography.json').then(r => r.json()),
          fetch('data/site.json').then(r => r.json()),
        ]);
      } catch (e) {
        paintings = FB_PAINTINGS;
        bio = FB_BIO;
        site = FB_SITE;
      }

      const hash = window.location.hash.slice(1);
      const parts = hash.split('/');

      if (parts[0] === 'biographie' || parts[0] === 'biography') currentView = 'bio';
      else if (parts[0] === 'contact') currentView = 'contact';
      else if (parts[0] === 'cookies') currentView = 'cookies';
      else if (parts[0] === 'mentions') currentView = 'mentions';
      else if (parts[0] === 'confidentialite') currentView = 'confidentialite';
      else if (parts[0] === 'oeuvres' && parts[1]) {
        const idx = paintings.findIndex(p => p.id === parts[1]);
        if (idx !== -1) { currentPaintingIdx = idx; currentView = 'detail'; }
      } else {
        currentView = 'oeuvres';
      }

      render();

      window.addEventListener('popstate', () => {
        const h = window.location.hash.slice(1);
        const p = h.split('/');
        if (p[0] === 'biographie' || p[0] === 'biography') showView('bio');
        else if (p[0] === 'contact') showView('contact');
        else if (p[0] === 'cookies') { showView('legal'); renderLegal('cookies'); }
        else if (p[0] === 'mentions') { showView('legal'); renderLegal('mentions'); }
        else if (p[0] === 'confidentialite') { showView('legal'); renderLegal('confidentialite'); }
        else if (p[0] === 'oeuvres' && p[1]) {
          const i = paintings.findIndex(x => x.id === p[1]);
          if (i !== -1) { currentPaintingIdx = i; showView('detail'); renderDetail(); }
        } else showView('oeuvres');
      });
    }

    /* ── NAVIGATE ── */
    function navigate(view, paintingIdx) {
      closeMobileNav();
      if (view === 'detail' && paintingIdx !== undefined) {
        currentPaintingIdx = paintingIdx;
        currentThumbIdx = 0;
        history.pushState(null, '', '#oeuvres/' + paintings[paintingIdx].id);
        showView('detail');
        renderDetail();
      } else if (view === 'oeuvres') {
        history.pushState(null, '', '#oeuvres');
        showView('oeuvres');
      } else if (view === 'bio') {
        history.pushState(null, '', '#biographie');
        showView('bio');
      } else if (view === 'contact') {
        history.pushState(null, '', '#contact');
        showView('contact');
      } else if (['cookies', 'mentions', 'confidentialite'].includes(view)) {
        history.pushState(null, '', '#' + view);
        showView('legal');
        renderLegal(view);
      }
      window.scrollTo(0, 0);
    }

    function showView(name) {
      currentView = name;
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      const isLegal = ['cookies', 'mentions', 'confidentialite'].includes(name);
      const idMap = {
        oeuvres: 'view-oeuvres', detail: 'view-detail',
        bio: 'view-bio', contact: 'view-contact', legal: 'view-legal',
      };
      document.getElementById(isLegal ? 'view-legal' : (idMap[name] || 'view-oeuvres')).classList.add('active');
      renderNav();
    }

    /* ── RENDER ALL ── */
    function render() {
      renderNav();
      renderGrid();
      renderBio();
      renderContact();
      renderFooter();
      if (currentView === 'detail') renderDetail();
      else if (['cookies', 'mentions', 'confidentialite'].includes(currentView)) renderLegal(currentView);
      showView(currentView);
      document.documentElement.lang = lang;
      const a = bio.artist || FB_BIO.artist;
      document.title = `${a.first_name} ${a.last_name} — ${a['profession_' + lang]}`;
    }

    function setLang(l) { lang = l; render(); }

    /* ── NAV ── */
    function renderNav() {
      const t = T();
      const links = [['oeuvres', t.nav_oeuvres], ['bio', t.nav_bio], ['contact', t.nav_contact]];
      const lt = `<div class="lang-toggle">
        <button class="lang-btn ${lang === 'fr' ? 'active' : ''}" onclick="setLang('fr')">FR</button>
        <button class="lang-btn ${lang === 'en' ? 'active' : ''}" onclick="setLang('en')">EN</button>
      </div>`;
      const activeMain = ['cookies', 'mentions', 'confidentialite'].includes(currentView) ? 'oeuvres' : currentView;
      const ls = links.map(([v, l]) =>
        `<button class="nav-link ${activeMain === v ? 'active' : ''}" onclick="navigate('${v}')">${l}</button>`
      ).join('');
      document.getElementById('desk-nav').innerHTML = ls + lt;
      document.getElementById('mobile-nav').innerHTML =
        links.map(([v, l]) =>
          `<button class="nav-link ${activeMain === v ? 'active' : ''}" onclick="navigate('${v}')">${l}</button>`
        ).join('') +
        `<div class="lang-toggle" style="align-self:flex-start;margin-top:4px">
          <button class="lang-btn ${lang === 'fr' ? 'active' : ''}" onclick="setLang('fr')">FR</button>
          <button class="lang-btn ${lang === 'en' ? 'active' : ''}" onclick="setLang('en')">EN</button>
        </div>`;
    }

    /* ── GRID ── */
    function renderGrid() {
      const t = T();
      document.getElementById('paintings-grid').innerHTML = paintings.map((p, i) => {
        const name = p['name_' + lang];
        const tech = p['technique_' + lang];
        const src = p.cover || (p.images && p.images[0]) || '';

        return `
          <div class="painting-card" onclick="navigate('detail',${i})"
               tabindex="0" role="button" aria-label="${name}"
               onkeydown="if(event.key==='Enter')navigate('detail',${i})">
            <div class="painting-thumb">
  <img src="${src}" alt="${name}" loading="lazy" onerror="this.style.display='none'">   </div>        
            <p class="painting-name">${name}</p>
            <p class="painting-meta">${tech}</p>
            ${p.price ? `<div class="painting-price-block">
              <span class="painting-price-label">${t.price_label}</span>
              <span class="painting-price-value">${p.price}</span>
            </div>` : ''}
          </div>`;
      }).join('');
    }

    /* ── DETAIL ── */
    function renderDetail() {
      const t = T();
      const p = paintings[currentPaintingIdx];
      const name = p['name_' + lang];
      const tech = p['technique_' + lang];
      const images = p.images && p.images.length ? p.images : [p.cover];

      document.getElementById('back-label').textContent = t.back;
      document.getElementById('detail-name').textContent = name;

      // Piasa style: plain running lines of info, no label/value rows
      const lines = [];
      if (tech) lines.push(tech);
      if (p.year) lines.push(p.year);
      if (p.dimensions) lines.push(p.dimensions);
      document.getElementById('detail-info-lines').innerHTML = lines.join('<br>');

      // Price as "Estimation" block
      const priceLabel = document.getElementById('detail-price-label');
      const priceValue = document.getElementById('detail-price-value');
      if (p.price) {
        priceLabel.textContent = t.price_label;
        priceValue.textContent = p.price;
        priceLabel.style.display = 'block';
        priceValue.style.display = 'block';
      } else {
        priceLabel.style.display = 'none';
        priceValue.style.display = 'none';
      }

      const mainImg = document.getElementById('detail-main-img');
      mainImg.src = images[currentThumbIdx] || '';
      mainImg.alt = name;

      const thumbsEl = document.getElementById('detail-thumbs');
      thumbsEl.innerHTML = images.length > 1
        ? images.map((src, i) => {

          return `<div class="detail-thumb ${i === currentThumbIdx ? 'active' : ''}" onclick="selectThumb(${i})">
              <img src="${src}" alt="${name} ${i + 1}" loading="lazy" onerror="this.style.display='none'">
            </div>`;
        }).join('')
        : '';

      document.getElementById('btn-prev').disabled = currentPaintingIdx === 0;
      document.getElementById('btn-next').disabled = currentPaintingIdx === paintings.length - 1;

    }

    function selectThumb(i) {
      const direction = i > currentThumbIdx ? 'right' : 'left';
      currentThumbIdx = i;
      const images = paintings[currentPaintingIdx].images || [paintings[currentPaintingIdx].cover];
      const mainImg = document.getElementById('detail-main-img');
      mainImg.classList.remove('slide-right', 'slide-left');
      void mainImg.offsetWidth;
      mainImg.src = images[i];
      mainImg.classList.add(direction === 'right' ? 'slide-right' : 'slide-left');
      document.querySelectorAll('.detail-thumb').forEach((el, idx) => {
        el.classList.toggle('active', idx === i);
      });
    }

    function detailNav(dir) {
      const next = currentPaintingIdx + dir;
      if (next < 0 || next >= paintings.length) return;
      currentPaintingIdx = next;
      currentThumbIdx = 0;
      history.replaceState(null, '', '#oeuvres/' + paintings[currentPaintingIdx].id);
      renderDetail();
      window.scrollTo(0, 0);
    }

    /* ── BIO ── */
    function renderBio() {
      const t = T();
      const a = (bio && bio.artist) ? bio.artist : FB_BIO.artist;

      const photoEl = document.getElementById('bio-photo');
      const src = bio.photo && bio.photo.src ? bio.photo.src : '';
      photoEl.innerHTML = src
        ? `<img src="${src}" alt="${(bio.photo['caption_' + lang]) || ''}" onerror="this.style.display='none'">
           <div class="bio-photo-placeholder">${bioSVG()}</div>`
        : `<div class="bio-photo-placeholder">${bioSVG()}</div>`;

      document.getElementById('bio-text').innerHTML =
        (bio['paragraphs_' + lang] || []).map(p => `<p>${p}</p>`).join('');
    }

    function bioSVG() {
      return `<svg viewBox="0 0 120 160" fill="none" xmlns="http://www.w3.org/2000/svg" width="50%">
        <circle cx="60" cy="38" r="22" stroke="#4a4846" stroke-width="1.5" fill="none"/>
        <path d="M10 160 Q10 100 60 95 Q110 100 110 160" stroke="#4a4846" stroke-width="1.5" fill="none"/>
      </svg>`;
    }

    /* ── CONTACT ── */
    function renderContact() {
      const t = T();
      const c = (site && site.contact) ? site.contact : FB_SITE.contact;
      document.getElementById('contact-block').innerHTML = `
        <div class="contact-row">
          <span class="contact-label">${t.email_label}</span>
          <span class="contact-value"><a href="mailto:${c.email}">${c.email}</a></span>
        </div>
        <div class="contact-row">
          <span class="contact-label">${t.phone_label}</span>
          <span class="contact-value"><a href="${c.phone_href}">${c.phone}</a></span>
        </div>`;
    }

    /* ── LEGAL ── */
    function renderLegal(page) {
      const t = T();
      document.getElementById('legal-back-label').textContent = t.back_home;
      document.getElementById('legal-content').innerHTML = LEGAL_CONTENT[page] || '';
    }

    /* ── FOOTER ── */
    function renderFooter() {
      const t = T();
      const a = (bio && bio.artist) ? bio.artist : FB_BIO.artist;
      document.getElementById('footer-copyright').innerHTML =
        `© ${new Date().getFullYear()} ${a.first_name} ${a.last_name}. ${t.all_rights}`;
      document.getElementById('footer-madeby').innerHTML = t.made_with;
    }

    /* ── MOBILE ── */
    function toggleMobile() {
      document.getElementById('mobile-nav').classList.toggle('open');
      document.getElementById('hamburger').classList.toggle('open');
    }
    function closeMobileNav() {
      document.getElementById('mobile-nav').classList.remove('open');
      document.getElementById('hamburger').classList.remove('open');
    }

    function T() {
      return ({
        fr: {
          nav_oeuvres: 'Œuvres', nav_bio: 'Biographie', nav_contact: 'Contact',
