<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jonathan Saada</title>
  <!-- <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin> -->
  <!-- <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600&display=swap" rel="stylesheet"> -->
  <!-- <link
    href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600&family=Josefin+Sans:wght@100;300&display=swap"
    rel="stylesheet"> -->
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }


    :root {
      --black: #0a0a0a;
      --white: #ffffff;
      --grey-bg: #EFEEF0;
      --grey-mid: #9a9591;
      --grey-dark: #4a4846;
      /* --border: #e0ddd9; */
      --font: 'Brown Pro', sans-serif;
      --nav-h: 68px;
      --max-w: 1160px;
    }

    @font-face {
      font-family: 'Brown Pro';
      src: url('fonts/BrownPro-Thin-CBYGkuCj.ttf') format('truetype');
      font-weight: 300;
      font-style: normal;
    }

    @font-face {
      font-family: 'Brown Pro';
      src: url('fonts/BrownPro-Regular-D_LjtTjE.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
    }

    @font-face {
      font-family: 'Brown Pro';
      src: url('fonts/BrownPro-Bold-OW29qoPv.ttf') format('truetype');
      font-weight: 700;
      font-style: normal;
    }

    html {
      scroll-behavior: smooth;
    }


    h1,
    h2 {
      font-weight: 700;
      /* Bold */
    }

    .detail-painting-name {
      font-size: clamp(20px, 2.5vw, 28px);
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 12px;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      display: block;
      max-width: 100%;
    }

    /* ── HEADER ── */
    header {
      position: fixed;
      inset: 0 0 auto 0;
      height: var(--nav-h);
      background: var(--white);
      border-bottom: 1px solid var(--border);
      z-index: 100;
    }

    .header-inner {
      height: 100%;
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 0 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo-wrap {
      display: flex;
      align-items: center;
      cursor: pointer;
      flex-shrink: 0;
    }

    .logo-svg {
      height: 22px;
      width: auto;
    }

    .logo-img {
      height: 40px;
      width: auto;
      display: block;
    }

    nav.desk {
      display: flex;
      align-items: center;
      gap: 32px;
    }

    .nav-link {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      position: relative;
      padding-bottom: 2px;
      cursor: pointer;
      background: none;
      border: none;
      color: var(--black);
      font-family: var(--font);
    }

    .nav-link::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: var(--black);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.25s ease;
    }

    .nav-link:hover::after {
      transform: scaleX(1);
    }

    .lang-toggle {
      display: flex;
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .lang-btn {
      font-family: var(--font);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.12em;
      padding: 5px 11px;
      cursor: pointer;
      background: var(--white);
      color: var(--grey-mid);
      border: none;
      transition: background 0.15s, color 0.15s;
    }

    .lang-btn.active {
      background: var(--black);
      color: var(--white);
    }

    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      background: none;
      border: none;
      padding: 4px;
    }

    .hamburger span {
      display: block;
      width: 22px;
      height: 1.5px;
      background: var(--black);
      transition: transform 0.26s, opacity 0.26s;
    }

    .hamburger.open span:nth-child(1) {
      transform: rotate(45deg) translate(4.5px, 4.5px);
    }

    .hamburger.open span:nth-child(2) {
      opacity: 0;
    }

    .hamburger.open span:nth-child(3) {
      transform: rotate(-45deg) translate(4.5px, -4.5px);
    }

    .mobile-nav {
      display: none;
      position: fixed;
      top: var(--nav-h);
      left: 0;
      right: 0;
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 28px 24px 32px;
      z-index: 99;
      flex-direction: column;
      gap: 26px;
    }

    .mobile-nav.open {
      display: flex;
    }

    .mobile-nav .nav-link {
      font-size: 13px;
    }

    /* ── VIEWS ── */
    #app {
      padding-top: var(--nav-h);
      min-height: 100vh;
    }

    .view {
      display: none;
    }

    .view.active {
      display: block;
    }

    /* ── OEUVRES GRID ── */
    #view-oeuvres {
      padding: 72px 40px 80px;
    }

    .oeuvres-inner {
      max-width: var(--max-w);
      margin: 0 auto;
    }

    .paintings-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 28px;
    }

    .painting-card {
      cursor: pointer;
    }

    .painting-thumb {
      aspect-ratio: 4 / 5;
      background: var(--grey-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    .painting-thumb img {
      max-width: 88%;
      max-height: 88%;
      width: auto;
      height: auto;
      object-fit: contain;
      transition: transform 0.5s ease;
      position: relative;
      z-index: 1;
    }

    .painting-card:hover .painting-thumb img {
      transform: scale(1.04);
    }

    .thumb-icon {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.18;
      z-index: 0;
    }

    .painting-name {
      font-size: 19px;
      font-weight: 400;
      margin: 12px 0 2px;
    }

    .painting-meta {
      font-size: 12px;
      color: var(--grey-mid);
      letter-spacing: 0.04em;
    }

    /* ── PAINTING DETAIL ── */
    #view-detail {
      padding: 48px 40px 80px;
    }

    .detail-inner {
      max-width: var(--max-w);
      margin: 0 auto;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--grey-mid);
      cursor: pointer;
      margin-bottom: 40px;
      background: none;
      border: none;
      font-family: var(--font);
      transition: color 0.2s;
    }

    .back-link:hover {
      color: var(--black);
    }

    .back-link svg {
      transition: transform 0.2s;
    }

    .back-link:hover svg {
      transform: translateX(-3px);
    }

    .detail-layout {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 60px;
      align-items: start;
    }

    .detail-main-wrap {
      background: var(--grey-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      aspect-ratio: 4 / 5;
      overflow: hidden;
      position: relative;
    }

    .detail-main-wrap img {
      max-width: 90%;
      max-height: 90%;
      width: auto;
      height: auto;
      object-fit: contain;
    }

    .detail-meta {
      margin-top: 8px;
    }

    .detail-meta-line {
      font-size: 15px;
      font-weight: 300;
      color: var(--grey-dark);
      line-height: 1.9;
    }

    /* .detail-meta-name {
      font-size: 15px;
      font-weight: 500;
      color: var(--black);
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    } */

    @keyframes slideFromRight {
      from {
        opacity: 0;
        transform: translateX(40px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes slideFromLeft {
      from {
        opacity: 0;
        transform: translateX(-40px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .detail-main-wrap img.slide-right {
      animation: slideFromRight 0.35s ease forwards;
    }

    .detail-main-wrap img.slide-left {
      animation: slideFromLeft 0.35s ease forwards;
    }

    .detail-thumbs {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }

    .detail-thumb {
      width: 72px;
      height: 90px;
      background: var(--grey-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border: 1.5px solid transparent;
      transition: border-color 0.18s;
      flex-shrink: 0;
      overflow: hidden;
    }

    .detail-thumb.active {
      border-color: var(--black);
    }

    .detail-thumb:hover:not(.active) {
      border-color: var(--border);
    }

    .detail-thumb img {
      max-width: 88%;
      max-height: 88%;
      width: auto;
      height: auto;
      object-fit: contain;
    }

    .detail-info {
      position: sticky;
      top: calc(var(--nav-h) + 32px);
    }

    .detail-painting-name {
      font-size: clamp(30px, 4vw, 48px);
      font-weight: 300;
      line-height: 1.1;
      margin-bottom: 24px;
    }

    .detail-meta {
      border-top: 1px solid var(--border);
      padding-top: 24px;
    }

    .detail-meta-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }

    .detail-meta-label {
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--grey-mid);
    }

    .detail-meta-value {
      font-size: 16px;
      font-weight: 300;
      text-align: right;
    }

    .detail-meta-row.price-row .detail-meta-label {
      color: var(--black);
      font-weight: 500;
    }

    .detail-meta-row.price-row .detail-meta-value {
      font-weight: 500;
    }

    .detail-nav {
      display: flex;
      justify-content: space-between;
      margin-top: 36px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }

    .detail-nav-btn {
      background: none;
      border: none;
      font-family: var(--font);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--grey-mid);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color 0.2s;
    }

    .detail-nav-btn:hover {
      color: var(--black);
    }

    .detail-nav-btn:disabled {
      opacity: 0.2;
      cursor: default;
    }

    /* ── BIOGRAPHY ── */
    #view-bio {
      padding: 72px 40px 80px;
    }

    .bio-inner {
      max-width: var(--max-w);
      margin: 0 auto;
    }

    .view-eyebrow {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--grey-mid);
      margin-bottom: 40px;
    }

    .bio-layout {
      display: grid;
      grid-template-columns: 5fr 4fr;
      gap: 72px;
      align-items: start;
    }

    .bio-photo {
      width: 100%;
      aspect-ratio: 3 / 4;
      overflow: hidden;
      background: var(--grey-bg);
      position: relative;
    }

    .bio-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .bio-photo-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.15;
    }

    .bio-text-col {
      position: sticky;
      top: calc(var(--nav-h) + 40px);
    }

    .bio-text-col p {
      font-size: 13px;
      line-height: 1.75;
      color: var(--grey-dark);
      margin-bottom: 12px;
    }

    .bio-text-col p:last-child {
      margin-bottom: 0;
    }

    /* ── CONTACT ── */
    #view-contact {
      padding: 72px 40px 80px;
    }

    .contact-inner {
      max-width: var(--max-w);
      margin: 0 auto;
    }

    .contact-block {
      max-width: 560px;
    }



    #view-contact {
      padding: 72px 40px 80px;
    }

    .contact-inner {
      max-width: var(--max-w);
      margin: 0 auto;
    }

    .contact-title {
      font-size: 16px;
      font-weight: 300;
      color: var(--grey-dark);
      line-height: 2;
    }

    .contact-line {
      font-size: 16px;
      font-weight: 300;
      color: var(--grey-dark);
      line-height: 2;
    }

    .contact-line a {
      color: var(--grey-dark);
    }

    .contact-line a:hover {
      text-decoration: underline;
      text-underline-offset: 4px;
    }

    .contact-inner {
      max-width: var(--max-w);
      margin: 0 auto;
      color: var(--grey-dark);
    }


    /* ── LEGAL PAGES ── */
    #view-legal {
      padding: 64px 40px 80px;
    }

    .legal-inner {
      max-width: 740px;
      margin: 0 auto;
    }

    .legal-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--grey-mid);
      cursor: pointer;
      margin-bottom: 48px;
      background: none;
      border: none;
      font-family: var(--font);
      transition: color 0.2s;
    }

    .legal-back:hover {
      color: var(--black);
    }

    .legal-back svg {
      transition: transform 0.2s;
    }

    .legal-back:hover svg {
      transform: translateX(-3px);
    }

    .legal-inner h1 {
      font-size: clamp(22px, 3vw, 32px);
      font-weight: 600;
      margin-bottom: 40px;
    }

    .legal-inner h2 {
      font-size: 14px;
      font-weight: 600;
      margin: 32px 0 10px;
    }

    .legal-inner p {
      font-size: 14px;
      line-height: 1.85;
      color: var(--grey-dark);
      margin-bottom: 14px;
    }

    .legal-inner ul {
      margin: 10px 0 14px 20px;
    }

    .legal-inner ul li {
      font-size: 14px;
      line-height: 1.85;
      color: var(--grey-dark);
      margin-bottom: 6px;
    }

    .legal-inner a {
      color: var(--black);
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    /* ── FOOTER ── */
    footer {
      background: var(--black);
      color: rgba(255, 255, 255, 0.38);
      padding: 52px 40px 0;
    }

    .footer-inner {
      max-width: var(--max-w);
      margin: 0 auto;
      display: flex;
      justify-content: center;
      /* center links */
      padding-bottom: 48px;
    }

    .footer-name {
      font-size: 13px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.85);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .footer-brand p {
      font-size: 12px;
      line-height: 1.7;
    }



    .footer-links h4 {
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 16px;
      font-weight: 500;
    }

    .footer-links ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: flex-start;
      /* ← left */
    }

    .footer-links a {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
      cursor: pointer;
      transition: color 0.18s;
    }

    .footer-links a:hover {
      color: rgba(255, 255, 255, 0.85);
    }


    .footer-bottom {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 20px 0 28px;
      border-top: 1px solid rgba(255, 255, 255, 0.07);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      gap: 16px;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 1000px) {
      .paintings-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      @media (max-width: 640px) {
        .footer-links ul {
          align-items: center;
          /* ← center */
          text-align: center;
        }
      }

      .detail-layout {
        grid-template-columns: 1fr;
      }

      .detail-info {
        position: static;
        margin-top: 32px;
      }

      .bio-layout {
        grid-template-columns: 1fr;
        gap: 40px;
      }

      .bio-text-col {
        position: static;
      }

      .footer-inner {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 640px) {
      :root {
        --nav-h: 60px;
        --font: 'Brown Pro', sans-serif;
      }

      #view-oeuvres,
      #view-detail,
      #view-bio,
      #view-contact,
      #view-legal {
        padding-left: 20px;
        padding-right: 20px;
      }

      .header-inner {
        padding: 0 20px;
      }

      nav.desk {
        display: none;
      }

      .hamburger {
        display: flex;
      }

      .paintings-grid {
        grid-template-columns: 1fr;
        gap: 32px;
      }

      .footer-inner {
        grid-template-columns: 1fr;
        gap: 32px;
      }

      .footer-bottom {
        flex-direction: column;
        gap: 6px;
        align-items: flex-start;
      }

      footer {
        padding: 44px 20px 0;
      }
    }

    /* ── TYPOGRAPHY SETTINGS ── */

    /* Body text */
    body {
      font-family: 'Brown Pro', sans-serif;
      font-weight: 400;
      font-size: 14px;
      line-height: 1.6;
      letter-spacing: 0.01em;
      color: #0a0a0a;
    }

    /* Navigation links — uppercase, tight tracking */
    .nav-link {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    /* Large titles (painting names, section heads) */
    .detail-painting-name,
    .view-title {
      font-size: clamp(28px, 4vw, 44px);
      font-weight: 300;
      /* light weight = Piasa elegance */
      letter-spacing: -0.02em;
      /* negative tracking on large text */
      line-height: 1.05;
    }

    /* Small labels (Technique, Année, Prix...) */
    .detail-meta-label,
    .contact-label,
    .view-eyebrow {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.2em;
      /* wide tracking on small caps */
      text-transform: uppercase;
    }

    /* Medium values (technique value, year value) */
    .detail-meta-value {
      font-size: 15px;
      font-weight: 300;
      letter-spacing: 0.01em;
    }

    /* Painting name in grid */
    .painting-name {
      font-size: 17px;
      font-weight: 400;
      letter-spacing: 0.005em;
    }

    /* Painting meta (technique · year) */
    .painting-meta {
      font-size: 12px;
      font-weight: 400;
      color: #9a9591;
      letter-spacing: 0.03em;
    }



    /* Footer name */
    .footer-name {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }
  </style>
</head>

<body>

  <header>
    <div class="header-inner">
      <!-- Replace SVG with <img class="logo-img" src="images/logo.svg" alt="Jonathan Saada"> when ready -->
      <div class="logo-wrap" onclick="navigate('oeuvres')" role="button" tabindex="0"
        onkeydown="if(event.key==='Enter')navigate('oeuvres')" aria-label="Accueil">
        <span style="
  font-family: 'Brown Pro', sans-serif;
  font-weight: 700;
  font-size: 12px;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: #0a0a0a;
  white-space: nowrap;
">Jonathan Saada</span>
      </div>
      <nav class="desk" id="desk-nav"></nav>
      <button class="hamburger" id="hamburger" aria-label="Menu" onclick="toggleMobile()">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <nav class="mobile-nav" id="mobile-nav"></nav>

  <div id="app">

    <div id="view-oeuvres" class="view active">
      <div class="oeuvres-inner">
        <div class="paintings-grid" id="paintings-grid"></div>
      </div>
    </div>

    <div id="view-detail" class="view">
      <div class="detail-inner">
        <button class="back-link" onclick="navigate('oeuvres')">
          <svg width="16" height="10" viewBox="0 0 16 10" fill="none">
            <path d="M0 5h15M5 1L1 5l4 4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" />
          </svg>
          <span id="back-label"></span>
        </button>
        <div class="detail-layout">
          <div>
            <div class="detail-main-wrap" id="detail-main-wrap">
              <img id="detail-main-img" src="" alt="">
            </div>
            <div class="detail-thumbs" id="detail-thumbs"></div>
          </div>
          <div class="detail-info">
            <h2 class="detail-painting-name" id="detail-name"></h2>
            <dl class="detail-meta" id="detail-meta"></dl>
            <div class="detail-nav">
              <button class="detail-nav-btn" id="btn-prev" onclick="detailNav(-1)">
                <svg width="14" height="8" viewBox="0 0 14 8" fill="none">
                  <path d="M0 4h13M4 1L1 4l3 3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" />
                </svg>
                <span id="label-prev"></span>
              </button>
              <button class="detail-nav-btn" id="btn-next" onclick="detailNav(1)">
                <span id="label-next"></span>
                <svg width="14" height="8" viewBox="0 0 14 8" fill="none">
                  <path d="M14 4H1M10 1l3 3-3 3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" />
                </svg>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="view-bio" class="view">
      <div class="bio-inner">
        <p class="view-eyebrow" id="eyebrow-bio"></p>
        <div class="bio-layout">
          <div class="bio-photo-col">
            <div class="bio-photo" id="bio-photo"></div>
          </div>
          <div class="bio-text-col" id="bio-text"></div>
        </div>
      </div>
    </div>

    <div id="view-contact" class="view">
      <div class="contact-inner">
        <!-- <p class="view-eyebrow" id="eyebrow-contact"></p> -->
        <div class="contact-block" id="contact-block"></div>
      </div>
    </div>

    <div id="view-legal" class="view">
      <div class="legal-inner">
        <button class="legal-back" onclick="navigate('oeuvres')">
          <svg width="16" height="10" viewBox="0 0 16 10" fill="none">
            <path d="M0 5h15M5 1L1 5l4 4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" />
          </svg>
          <span id="legal-back-label">Retour</span>
        </button>
        <div id="legal-content"></div>
      </div>
    </div>

  </div>

  <footer>
    <div class="footer-inner">
      <div class="footer-brand" id="footer-brand"></div>
      <div class="footer-links">
        <ul>
          <li><a onclick="navigate('cookies')" href="#cookies">Politique en matière de cookies</a></li>
          <li><a onclick="navigate('mentions')" href="#mentions">Mentions légales</a></li>
          <li><a onclick="navigate('confidentialite')" href="#confidentialite">Politique de confidentialité</a></li>
        </ul>
      </div>
    </div>
    <div class="footer-bottom" id="footer-bottom"></div>
  </footer>

  <script>
    /* ── STATE ── */
    let lang = 'fr';
    let paintings = [];
    let bio = {};
    let site = {};
    let currentView = 'oeuvres';
    let currentPaintingIdx = 0;
    let currentThumbIdx = 0;

    /* ── BOOT ── */
    async function boot() {
      try {
        [paintings, bio, site] = await Promise.all([
          fetch('data/paintings.json').then(r => r.json()),
          fetch('data/biography.json').then(r => r.json()),
          fetch('data/site.json').then(r => r.json()),
        ]);
      } catch (e) {
        paintings = FB_PAINTINGS;
        bio = FB_BIO;
        site = FB_SITE;
      }

      const hash = window.location.hash.slice(1);
      const parts = hash.split('/');

      if (parts[0] === 'biographie' || parts[0] === 'biography') currentView = 'bio';
      else if (parts[0] === 'contact') currentView = 'contact';
      else if (parts[0] === 'cookies') currentView = 'cookies';
      else if (parts[0] === 'mentions') currentView = 'mentions';
      else if (parts[0] === 'confidentialite') currentView = 'confidentialite';
      else if (parts[0] === 'oeuvres' && parts[1]) {
        const idx = paintings.findIndex(p => p.id === parts[1]);
        if (idx !== -1) { currentPaintingIdx = idx; currentView = 'detail'; }
      } else {
        currentView = 'oeuvres';
      }

      render();

      window.addEventListener('popstate', () => {
        const h = window.location.hash.slice(1);
        const p = h.split('/');
        if (p[0] === 'biographie' || p[0] === 'biography') showView('bio');
        else if (p[0] === 'contact') showView('contact');
        else if (p[0] === 'cookies') { showView('legal'); renderLegal('cookies'); }
        else if (p[0] === 'mentions') { showView('legal'); renderLegal('mentions'); }
        else if (p[0] === 'confidentialite') { showView('legal'); renderLegal('confidentialite'); }
        else if (p[0] === 'oeuvres' && p[1]) {
          const i = paintings.findIndex(x => x.id === p[1]);
          if (i !== -1) { currentPaintingIdx = i; showView('detail'); renderDetail(); }
        } else showView('oeuvres');
      });
    }

    /* ── NAVIGATE ── */
    function navigate(view, paintingIdx) {
      closeMobileNav();
      if (view === 'detail' && paintingIdx !== undefined) {
        currentPaintingIdx = paintingIdx;
        currentThumbIdx = 0;
        history.pushState(null, '', '#oeuvres/' + paintings[paintingIdx].id);
        showView('detail');
        renderDetail();
      } else if (view === 'oeuvres') {
        history.pushState(null, '', '#oeuvres');
        showView('oeuvres');
      } else if (view === 'bio') {
        history.pushState(null, '', '#biographie');
        showView('bio');
      } else if (view === 'contact') {
        history.pushState(null, '', '#contact');
        showView('contact');
      } else if (['cookies', 'mentions', 'confidentialite'].includes(view)) {
        history.pushState(null, '', '#' + view);
        showView('legal');
        renderLegal(view);
      }
      window.scrollTo(0, 0);
    }

    function showView(name) {
      currentView = name;
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      const isLegal = ['cookies', 'mentions', 'confidentialite'].includes(name);
      const idMap = {
        oeuvres: 'view-oeuvres', detail: 'view-detail',
        bio: 'view-bio', contact: 'view-contact', legal: 'view-legal',
      };
      document.getElementById(isLegal ? 'view-legal' : (idMap[name] || 'view-oeuvres')).classList.add('active');
      renderNav();
    }

    /* ── RENDER ALL ── */
    function render() {
      renderNav();
      renderGrid();
      renderBio();
      renderContact();
      renderFooter();
      if (currentView === 'detail') renderDetail();
      else if (['cookies', 'mentions', 'confidentialite'].includes(currentView)) renderLegal(currentView);
      showView(currentView);
      document.documentElement.lang = lang;
      const a = bio.artist || FB_BIO.artist;
      document.title = `${a.first_name} ${a.last_name} — ${a['profession_' + lang]}`;
    }

    function setLang(l) { lang = l; render(); }

    /* ── NAV ── */
    function renderNav() {
      const t = T();
      const links = [['oeuvres', t.nav_oeuvres], ['bio', t.nav_bio], ['contact', t.nav_contact]];
      const lt = `<div class="lang-toggle">
        <button class="lang-btn ${lang === 'fr' ? 'active' : ''}" onclick="setLang('fr')">FR</button>
        <button class="lang-btn ${lang === 'en' ? 'active' : ''}" onclick="setLang('en')">EN</button>
      </div>`;
      const activeMain = ['cookies', 'mentions', 'confidentialite'].includes(currentView) ? 'oeuvres' : currentView;
      const ls = links.map(([v, l]) =>
        `<button class="nav-link ${activeMain === v ? 'active' : ''}" onclick="navigate('${v}')">${l}</button>`
      ).join('');
      document.getElementById('desk-nav').innerHTML = ls + lt;
      document.getElementById('mobile-nav').innerHTML =
        links.map(([v, l]) =>
          `<button class="nav-link ${activeMain === v ? 'active' : ''}" onclick="navigate('${v}')">${l}</button>`
        ).join('') +
        `<div class="lang-toggle" style="align-self:flex-start;margin-top:4px">
          <button class="lang-btn ${lang === 'fr' ? 'active' : ''}" onclick="setLang('fr')">FR</button>
          <button class="lang-btn ${lang === 'en' ? 'active' : ''}" onclick="setLang('en')">EN</button>
        </div>`;
    }

    /* ── GRID ── */
    function renderGrid() {
      document.getElementById('paintings-grid').innerHTML = paintings.map((p, i) => {
        const name = p['name_' + lang];
        const tech = p['technique_' + lang];
        const src = p.cover || (p.images && p.images[0]) || '';
        return `
          <div class="painting-card" onclick="navigate('detail',${i})"
               tabindex="0" role="button" aria-label="${name}"
               onkeydown="if(event.key==='Enter')navigate('detail',${i})">
            <div class="painting-thumb">
              <img src="${src}" alt="${name}" loading="lazy" onerror="this.style.display='none'">
              <div class="thumb-icon">${thumbIcon()}</div>
            </div>
            <p class="painting-name">${name}</p>
            <p class="painting-meta">${tech} · ${p.year}</p>
          </div>`;
      }).join('');
    }

    function thumbIcon() {
      return `<svg width="44" height="56" viewBox="0 0 44 56" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="3" y="3" width="38" height="50" rx="1" stroke="#4a4846" stroke-width="1.2" fill="none"/>
        <rect x="9" y="11" width="13" height="17" fill="#4a4846" opacity="0.5"/>
        <rect x="26" y="19" width="10" height="12" fill="#4a4846" opacity="0.3"/>
      </svg>`;
    }

    /* ── DETAIL ── */
    function renderDetail() {
      const t = T();
      const p = paintings[currentPaintingIdx];
      const name = p['name_' + lang];
      const tech = p['technique_' + lang];
      const images = p.images && p.images.length ? p.images : [p.cover];

      document.getElementById('back-label').textContent = t.back;
      document.getElementById('detail-name').innerHTML = `<strong>${name}</strong>`;
      const metaLines = [
        p.year ? `<p class="detail-meta-line">(${p.year})</p>` : '',
        tech ? `<p class="detail-meta-line">${tech}</p>` : '',
        p.dimensions ? `<p class="detail-meta-line">${p.dimensions}</p>` : '',
        p.price ? `<p class="detail-meta-line detail-meta-price">${p.price}</p>` : '',
      ].filter(Boolean).join('');

      document.getElementById('detail-meta').innerHTML = metaLines;

      const mainImg = document.getElementById('detail-main-img');
      mainImg.src = images[currentThumbIdx] || '';
      mainImg.alt = name;

      const thumbsEl = document.getElementById('detail-thumbs');
      thumbsEl.innerHTML = images.length > 1
        ? images.map((src, i) =>
          `<div class="detail-thumb ${i === currentThumbIdx ? 'active' : ''}" onclick="selectThumb(${i})">
            <img src="${src}" alt="${name} ${i + 1}" loading="lazy" onerror="this.style.display='none'">
          </div>`).join('')
        : '';

      document.getElementById('label-prev').textContent = t.prev;
      document.getElementById('label-next').textContent = t.next;
      document.getElementById('btn-prev').disabled = currentPaintingIdx === 0;
      document.getElementById('btn-next').disabled = currentPaintingIdx === paintings.length - 1;
    }

    function selectThumb(i) {
      const direction = i > currentThumbIdx ? 'right' : 'left';
      currentThumbIdx = i;
      const images = paintings[currentPaintingIdx].images || [paintings[currentPaintingIdx].cover];
      const mainImg = document.getElementById('detail-main-img');
      mainImg.classList.remove('slide-right', 'slide-left');
      void mainImg.offsetWidth;
      mainImg.src = images[i];
      mainImg.classList.add(direction === 'right' ? 'slide-right' : 'slide-left');
      document.querySelectorAll('.detail-thumb').forEach((el, idx) => {
        el.classList.toggle('active', idx === i);
      });
    }

    function detailNav(dir) {
      const next = currentPaintingIdx + dir;
      if (next < 0 || next >= paintings.length) return;
      currentPaintingIdx = next;
      currentThumbIdx = 0;
      history.replaceState(null, '', '#oeuvres/' + paintings[currentPaintingIdx].id);
      renderDetail();
      window.scrollTo(0, 0);
    }

    /* ── BIO ── */
    function renderBio() {
      const t = T();
      const photoEl = document.getElementById('bio-photo');
      const src = bio.photo && bio.photo.src ? bio.photo.src : '';
      photoEl.innerHTML = src
        ? `<img src="${src}" alt="${(bio.photo['caption_' + lang]) || ''}" onerror="this.style.display='none'">
           <div class="bio-photo-placeholder">${bioSVG()}</div>`
        : `<div class="bio-photo-placeholder">${bioSVG()}</div>`;
      document.getElementById('bio-text').innerHTML =
        (bio['paragraphs_' + lang] || []).map(p => `<p>${p}</p>`).join('');
    }

    function bioSVG() {
      return `<svg viewBox="0 0 120 160" fill="none" xmlns="http://www.w3.org/2000/svg" width="50%">
        <circle cx="60" cy="38" r="22" stroke="#4a4846" stroke-width="1.5" fill="none"/>
        <path d="M10 160 Q10 100 60 95 Q110 100 110 160" stroke="#4a4846" stroke-width="1.5" fill="none"/>
      </svg>`;
    }


    function renderContact() {
      const t = T();
      const c = (site && site.contact) ? site.contact : FB_SITE.contact;
      document.getElementById('contact-block').innerHTML = `
    <p class="contact-title">Contact</p>
    <p class="contact-line"><a href="mailto:${c.email}">${c.email}</a></p>
    <p class="contact-line"><a href="${c.phone_href}">${c.phone}</a></p>`;
    }

    /* ── LEGAL ── */
    function renderLegal(page) {
      const t = T();
      document.getElementById('legal-back-label').textContent = t.back_home;
      document.getElementById('legal-content').innerHTML = LEGAL_CONTENT[page] || '';
    }

    /* ── FOOTER ── */
    function renderFooter() {
      const t = T();
      const l = (site && site.legal) ? site.legal : FB_SITE.legal;
      const a = (bio && bio.artist) ? bio.artist : FB_BIO.artist;

      document.getElementById('footer-brand').innerHTML = '';


      document.getElementById('footer-bottom').innerHTML = `
    <span>© ${l.copyright_year} ${a.first_name} ${a.last_name}. ${t.all_rights}</span>
    <span>${t.made_with}</span>`;
    }

    /* ── MOBILE ── */
    function toggleMobile() {
      document.getElementById('mobile-nav').classList.toggle('open');
      document.getElementById('hamburger').classList.toggle('open');
    }
    function closeMobileNav() {
      document.getElementById('mobile-nav').classList.remove('open');
      document.getElementById('hamburger').classList.remove('open');
    }

    /* ── TRANSLATIONS ── */
    function T() {
      return ({
        fr: {
          nav_oeuvres: 'Œuvres', nav_bio: 'Biographie', nav_contact: 'Contact',
          back: 'Œuvres', back_home: 'Retour',
          technique_label: 'Technique', dimensions_label: 'Dimensions',
          year_label: 'Année', price_label: 'Prix',

          f_rgpd: 'Data (GDPR):',
          f_rgpd_body: 'This site collects no personal data. Contact:',

    /* ── FALLBACK DATA (exact mirror of JSON files — update both together) ── */
    const FB_PAINTINGS = [
      { id: "tama", name_fr: "Tama", name_en: "Tama", technique_fr: "Huile sur toile", technique_en: "Oil on canvas", year: 2025, dimensions: "46 × 38 cm", price: "2 000 €", images: ["images/paintings/tama.png", "images/paintings/tama-detail.jpg"], cover: "images/paintings/tama.png" },
